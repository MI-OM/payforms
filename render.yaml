services:
  - type: web
    name: payforms-backend
    env: node
    plan: free
    branch: main
    rootDir: apps/backend
    buildCommand: cd apps/backend && npm install && npm run build
    startCommand: cd apps/backend && npm run start
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
